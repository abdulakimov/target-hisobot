# Dev override: just Postgres in Docker; run api/web on the host with `pnpm dev`.
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hisobotchi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-hisobotchi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hisobotchi} -d ${POSTGRES_DB:-hisobotchi}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
