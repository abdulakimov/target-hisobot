# VPS deploy using pre-built images from GHCR (built by CI — no on-box build).
# This is the preferred prod flow on the RAM-tight VPS; docker-compose.vps.yml (on-box
# build) stays as a fallback. See docs/deploy-ci.md.
#
# Usage on the VPS (from /opt/target-hisobotchi-bot):
#   docker compose -f docker-compose.registry.yml pull
#   docker compose -f docker-compose.registry.yml up -d
#
# Pin a specific build for rollback by exporting tags before `up`:
#   export API_IMAGE=ghcr.io/abdulakimov/target-hisobot/api:sha-abc1234
#   export WEB_IMAGE=ghcr.io/abdulakimov/target-hisobot/web:sha-abc1234
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-ghcr.io/abdulakimov/target-hisobot/api:latest}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:-ghcr.io/abdulakimov/target-hisobot/web:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - '127.0.0.1:3014:80'
    depends_on:
      - api

volumes:
  pgdata:
